# .github/workflows/deploy.yml
name: Build, Push & Deploy

on:
  workflow_dispatch:  

jobs:
  # ──────────────────────────────────────────
  # JOB 1a: Build & Push Backend Container
  # ──────────────────────────────────────────
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/youtube-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/youtube-backend:${{ github.sha }}

  # ──────────────────────────────────────────
  # JOB 1b: Build & Push Frontend Container
  # ──────────────────────────────────────────
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./newsapps
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/youtube-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/youtube-frontend:${{ github.sha }}



  # buid api proxy
  build-apiproxy:
    name: Build & Push API Proxy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API Proxy
        uses: docker/build-push-action@v5
        with:
          context: ./api-proxy
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/youtube-api-proxy:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/youtube-api-proxy:${{ github.sha }}


  # ──────────────────────────────────────────
  # JOB 2: Terraform (runs after BOTH builds)
  # ──────────────────────────────────────────
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend,build-apiproxy]

    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var="docker_image_tag=${{ github.sha }}"
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="docker_image_tag=${{ github.sha }}"
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}